<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Onhand</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <div>
          <div class="eyebrow">Onhand desktop shell</div>
          <h1>Ask about what’s already on your screen.</h1>
          <p class="subhead">
            This first shell already talks to the browser bridge and shows the current page context.
            Prompt routing to the full Onhand agent is the next step.
          </p>
        </div>
        <div class="header-actions">
          <div id="statusPill" class="status-pill">Loading…</div>
          <button id="refreshButton" class="secondary-button">Refresh context</button>
        </div>
      </header>

      <section class="palette-card">
        <form id="promptForm" class="prompt-form">
          <input
            id="promptInput"
            class="prompt-input"
            placeholder="Ask Onhand about the page you’re looking at…"
            autocomplete="off"
            spellcheck="false"
          />
          <button type="submit" class="primary-button">Send</button>
        </form>
        <div id="hotkeyHint" class="hotkey-hint"></div>
      </section>

      <main class="content-grid">
        <section class="panel transcript-panel">
          <div class="panel-header">
            <h2>Session</h2>
          </div>
          <div id="transcript" class="transcript"></div>
        </section>

        <section class="panel context-panel">
          <div class="panel-header">
            <h2>Current browser context</h2>
          </div>
          <div id="contextSummary" class="context-summary">Loading browser context…</div>
        </section>
      </main>
    </div>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
