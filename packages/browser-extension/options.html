<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Onhand Browser Bridge Options</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 760px;
        margin: 32px auto;
        padding: 0 16px;
        color: #111827;
      }
      h1 {
        margin-bottom: 8px;
      }
      p.help {
        color: #4b5563;
        margin-top: 0;
      }
      .field {
        margin: 16px 0;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        font-size: 14px;
        box-sizing: border-box;
      }
      .row {
        display: flex;
        gap: 12px;
        margin-top: 24px;
      }
      button {
        padding: 10px 14px;
        font-size: 14px;
      }
      pre {
        white-space: pre-wrap;
        background: #f3f4f6;
        padding: 12px;
        border-radius: 8px;
      }
      .status {
        margin-top: 24px;
      }
      .ok {
        color: #065f46;
      }
      .warn {
        color: #92400e;
      }
      .error {
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <h1>Onhand Browser Bridge</h1>
    <p class="help">
      Configure the local bridge server the extension should connect to.
    </p>

    <div class="field">
      <label for="bridgeUrl">Bridge WebSocket URL</label>
      <input id="bridgeUrl" placeholder="ws://127.0.0.1:3210/ws" />
    </div>

    <div class="field">
      <label for="token">Bridge token</label>
      <input id="token" placeholder="Paste the token from npm run bridge:token" />
    </div>

    <div class="field">
      <label for="clientLabel">Client label</label>
      <input id="clientLabel" placeholder="Chrome Test, Helium, Personal Browser, etc." />
    </div>

    <div class="row">
      <button id="save">Save</button>
      <button id="test">Test bridge</button>
      <button id="refresh">Refresh status</button>
    </div>

    <div class="status">
      <h2>Status</h2>
      <pre id="status">Loading…</pre>
    </div>

    <script type="module" src="options.js"></script>
  </body>
</html>
